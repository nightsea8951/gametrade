<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日幣代購 金額試算 | hibaby 日本專業代購</title>
    
    <meta name="description" content="專業日本代購試算工具，專精於 Gametrade 帳號代購、日本演唱會超商代付及哥吉拉商店代購。提供透明的日幣匯率公式。">
    <meta name="keywords" content="Gametrade代購, 日本代購, 日本代付, 日本演唱會代付, 日幣試算, hibaby">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #007AFF; 
            --accent: #00cec9;
            --success: #34C759;
            --bg-light: #F5F5F7;
            --card-white: rgba(255, 255, 255, 0.92); 
            --text-dark: #1D1D1F;
            --text-gray: #86868B;
            --cat-color: #2c3e50; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: var(--text-dark);
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* 背景流動動畫 */
        body::before, body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
        }
        body::before {
            animation: 流動Silk 12s ease-in-out infinite;
            background: linear-gradient(-45deg, #fff, #e3f2fd, #f1f8e9, #fff);
            background-size: 400% 400%;
        }
        body::after {
            animation: 流動Silk 15s ease infinite alternate;
            background: radial-gradient(circle at 10% 20%, rgb(255, 255, 255) 0%, rgb(220, 240, 255) 50%, rgb(200, 230, 255) 100%);
            opacity: 0.5;
        }
        @keyframes 流動Silk {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-white);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 40px;
            padding: 50px 45px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            position: relative;
            z-index: 2;
            animation: slideInUp 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        header { text-align: center; margin-bottom: 35px; }
        h1 { font-size: 2rem; font-weight: 700; margin-bottom: 10px; color: var(--text-dark); }
        .subtitle { font-size: 0.95rem; color: var(--text-gray); letter-spacing: 2px; }

        .badges-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 40px;
        }
        .badge {
            padding: 8px 18px;
            border-radius: 14px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .bg-concert { background: #E3F2FD; color: #1976D2; } 
        .bg-game { background: #F3E5F5; color: #7B1FA2; }    
        .bg-godzilla { background: #FFF3E0; color: #E65100; } 
        .bg-cvs { background: #E8F5E9; color: #2E7D32; }     
        .bg-errand { background: #FFEBEE; color: #C62828; }  
        .bg-global { background: #E0F7FA; color: #00838F; }  

        .input-box { margin-bottom: 30px; }
        label { display: block; font-size: 1.1rem; margin-bottom: 15px; font-weight: 600; }
        .field-group { position: relative; }
        .field-group .unit {
            position: absolute;
            left: 25px; top: 50%;
            transform: translateY(-50%);
            font-family: 'Montserrat';
            font-size: 1.6rem;
            color: var(--primary);
            font-weight: 700;
        }
        input {
            width: 100%;
            background: #FFFFFF;
            border: 2px solid #E5E5E7;
            border-radius: 22px;
            padding: 22px 25px 22px 65px;
            font-size: 1.6rem;
            color: var(--text-dark);
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 20px rgba(0,122,255,0.15); }

        button {
            width: 100%;
            padding: 22px;
            background: linear-gradient(135deg, var(--primary) 0%, #0056b3 100%);
            border: none;
            border-radius: 22px;
            color: white;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(0, 122, 255, 0.35); }

        #result-area {
            margin-top: 40px;
            background: #F9FAFB;
            border-radius: 30px;
            padding: 35px;
            text-align: center;
            border: 2px solid rgba(0, 122, 255, 0.05);
            display: none;
            animation: fadeIn 0.5s ease-out;
        }
        .res-value { font-size: 4.2rem; font-family: 'Montserrat'; font-weight: 700; color: var(--success); }
        .currency { font-size: 1.6rem; margin-right: 8px; color: var(--text-dark); }

        footer { margin-top: 40px; font-size: 0.85rem; color: var(--text-gray); text-align: center; opacity: 0.7; }

        /* --- 🐰 對話氣泡與兔子連結 --- */
        .cat-peek {
            position: fixed;
            bottom: -5px; right: 40px;
            width: 90px; height: 70px;
            z-index: 1;
            transition: 0.3s;
            text-decoration: none;
        }

        /* 對話氣泡樣式 */
        .speech-bubble {
            position: absolute;
            top: -65px; /* 在頭頂上方 */
            right: -10px;
            background: var(--primary);
            color: white;
            padding: 8px 15px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 15px rgba(0, 122, 255, 0.3);
        }

        /* 氣泡小箭頭 */
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            right: 35px;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 10px solid var(--primary);
        }

        /* 選到兔子（Hover）時顯示氣泡 */
        .cat-peek:hover .speech-bubble {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .cat-peek:hover { transform: translateY(-10px); }

        .cat-head {
            position: absolute; bottom: 0; left: 0;
            width: 85px; height: 65px;
            background: var(--cat-color);
            border-radius: 50px 50px 0 0;
        }
        .ear { position: absolute; top: -18px; width: 25px; height: 35px; background: var(--cat-color); border-radius: 50% 50% 0 0; }
        .ear.left { left: 10px; transform: rotate(-15deg); animation: earTwitchLeft 6s infinite alternate; }
        .ear.right { right: 10px; transform: rotate(15deg); animation: earTwitchRight 6s infinite 0.5s alternate; }
        .eye { position: absolute; top: 22px; width: 15px; height: 15px; background: #F4D03F; border-radius: 50%; animation: blink 8s infinite; }
        .eye.left { left: 22px; } .eye.right { right: 22px; }
        .eye::after { content: ''; position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: #000; border-radius: 50%; transform: translate(-50%, -50%); }
        .nose { position: absolute; top: 38px; left: 50%; transform: translateX(-50%); border-left: 5px solid transparent; border-right: 5px solid transparent; border-top: 5px solid #ffcccc; }

        @keyframes blink { 0%, 48%, 52%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }
        @keyframes earTwitchLeft { 0%, 90% { transform: rotate(-15deg); } 92% { transform: rotate(-25deg); } }
        @keyframes earTwitchRight { 0%, 85% { transform: rotate(15deg); } 87% { transform: rotate(25deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>日幣代購 金額試算</h1>
        <div class="subtitle">僅計算代付金額，不計入運費</div>
    </header>

    <div class="badges-container">
        <div class="badge bg-concert">演唱會超商代付</div>
        <div class="badge bg-game">GameTrade / Club</div>
        <div class="badge bg-godzilla">哥吉拉代購</div>
        <div class="badge bg-cvs">7-11 / 羅森 / 全家</div>
        <div class="badge bg-errand">跑腿代付</div>
        <div class="badge bg-global">日本全通路代付</div>
    </div>

    <div class="input-box">
        <label>請輸入商品日幣金額 (JPY)</label>
        <div class="field-group">
            <span class="unit">¥</span>
            <input type="number" id="jpyAmount" placeholder="0" autocomplete="off">
        </div>
    </div>

    <button onclick="calculate()">立即計算預估總額</button>

    <div id="result-area">
        <div class="res-label" style="font-size: 1rem; color: var(--text-gray); letter-spacing: 2px; margin-bottom: 12px;">預估結帳總額 (TWD)</div>
        <div class="res-value"><span class="currency">NT$</span><span id="twdDisplay">0</span></div>
    </div>

    <footer>&copy; 2026 hibaby Proxy Service. Secure & Professional.</footer>
</div>

<a href="https://www.hibabyfunbox.com/" class="cat-peek">
    <div class="speech-bubble">返回 hibaby 官網</div>
    <div class="cat-head">
        <div class="ear left"></div>
        <div class="ear right"></div>
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="nose"></div>
    </div>
</a>

<script>
    function calculate() {
        const jpyInput = document.getElementById('jpyAmount');
        const jpy = parseFloat(jpyInput.value);
        const display = document.getElementById('twdDisplay');
        const resultArea = document.getElementById('result-area');

        if (!jpy || jpy < 0) {
            alert("請輸入有效的金額");
            jpyInput.focus();
            return;
        }

        let twd = 0;
        if (jpy < 30000) {
            twd = (jpy / 5) * 1.28 + 30;
        } else if (jpy >= 30000 && jpy <= 50000) {
            twd = (jpy / 5) * 1.28;
        } else {
            let rawTwd = (jpy / 5) * 1.25;
            let remainder = rawTwd % 100;
            twd = remainder <= 50 ? Math.floor(rawTwd / 100) * 100 : Math.ceil(rawTwd / 100) * 100;
        }

        resultArea.style.display = 'block';
        animateValue(display, 0, Math.round(twd), 1000);
    }

    function animateValue(obj, start, end, duration) {
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            obj.innerHTML = Math.floor(progress * (end - start) + start).toLocaleString();
            if (progress < 1) window.requestAnimationFrame(step);
        };
        window.requestAnimationFrame(step);
    }
</script>

</body>
</html>
