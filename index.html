<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本代購金額試算器</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background-color: #f4f7f6; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #333; text-align: center; margin-bottom: 1.5rem; }
        .service-list { font-size: 0.9rem; color: #666; margin-bottom: 1.5rem; border-left: 4px solid #007bff; padding-left: 10px; }
        .input-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 1.5rem; padding: 15px; background: #e9ecef; border-radius: 6px; text-align: center; display: none; }
        .twd-price { font-size: 1.5rem; font-weight: bold; color: #d9534f; }
    </style>
</head>
<body>

<div class="card">
    <h2>代購金額試算器</h2>
    <div class="service-list">
        支援服務：<br>
        • 日本演唱會 (超商取票付款)<br>
        • GameTrade / GameClub 代購
    </div>

    <div class="input-group">
        <label for="jpyAmount">請輸入日幣金額 (JPY)</label>
        <input type="number" id="jpyAmount" placeholder="例如: 10000" min="0">
    </div>

    <button onclick="calculate()">立即試算</button>

    <div id="result">
        <div>預估代購總額 (TWD)</div>
        <div class="twd-price" id="twdDisplay">$0</div>
        <div id="logicNote" style="font-size: 0.8rem; color: #777; margin-top: 8px;"></div>
    </div>
</div>

<script>
    function calculate() {
        const jpy = parseFloat(document.getElementById('jpyAmount').value);
        const display = document.getElementById('twdDisplay');
        const resultDiv = document.getElementById('result');
        const logicNote = document.getElementById('logicNote');

        if (isNaN(jpy) || jpy <= 0) {
            alert("請輸入有效的金額");
            return;
        }

        let twd = 0;
        let note = "";

        if (jpy < 30000) {
            // 小於 30000：日幣/5 * 1.28 + 30
            twd = (jpy / 5) * 1.28 + 30;
            note = "計算公式：(日幣/5 × 1.28) + 30台幣手續費";
            twd = Math.round(twd); // 一般情況採四捨五入取整數
        } 
        else if (jpy >= 30000 && jpy <= 50000) {
            // 中間地帶 (你沒提到，暫設為 1.28 但不加手續費，或維持原樣)
            twd = (jpy / 5) * 1.28;
            note = "計算公式：日幣/5 × 1.28";
            twd = Math.round(twd);
        }
        else {
            // 大於 50000：日幣/5 * 1.25
            let rawTwd = (jpy / 5) * 1.25;
            
            // 特殊捨入邏輯：尾數 <= 50 捨去，> 50 進位
            let remainder = rawTwd % 100;
            if (remainder <= 50) {
                twd = Math.floor(rawTwd / 100) * 100;
            } else {
                twd = Math.ceil(rawTwd / 100) * 100;
            }
            note = "計算公式：日幣/5 × 1.25 (套用百位數捨入規則)";
        }

        display.innerText = "$" + twd.toLocaleString();
        logicNote.innerText = note;
        resultDiv.style.display = 'block';
    }
</script>

</body>
</html>
